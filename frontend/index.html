    <style>
      /* Critical CSS for Preloader */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease-out, visibility 0.4s;
      }
      .loader-logo {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #3b82f6, #4f46e5);
        border-radius: 18px;
        margin-bottom: 20px;
        animation: pulse 1.5s ease-in-out infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 900;
        font-size: 24px;
        box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
      }
      .loader-bar {
        width: 120px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        top: 0; left: 0; height: 100%; width: 50%;
        background: #3b82f6;
        animation: progress 1.2s infinite ease-in-out;
      }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
      @keyframes progress { 0% { left: -50%; } 100% { left: 100%; } }
      body.loaded #initial-loader { opacity: 0; visibility: hidden; }
    </style>
